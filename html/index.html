<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="currentColor" class="spotify-icon">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.84.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15.001 10.62 18.6 12.84c.36.18.54.78.361 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.54-1.02.72-1.56.3z"/>
                </svg>
                <h1>Spotify Connect</h1>
            </div>
            <div class="status-badge" id="serviceStatus">
                <span class="dot"></span>
                <span class="text">Checking...</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Now Playing Widget -->
            <section class="card widget-card">
                <div class="widget-content">
                    <div class="album-art-placeholder" id="albumArt">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                        </svg>
                    </div>
                    <div class="track-info">
                        <h2 id="playbackState">Ready to play</h2>
                        <p id="trackDetails">Select this camera in your Spotify app</p>
                    </div>
                </div>
                <div class="visualizer" id="visualizer">
                    <!-- Bars are generated by JS -->
                </div>
            </section>

            <!-- Settings -->
            <section class="card settings-card">
                <div class="card-header">
                    <h2>Device Settings</h2>
                    <p>Configure how this device appears on your network</p>
                </div>
                
                <form id="settingsForm" class="settings-form">
                    <div class="form-group">
                        <label for="DeviceName">Device Name</label>
                        <input type="text" id="DeviceName" name="DeviceName" placeholder="e.g. Living Room Speaker">
                        <span class="help-text">This name will appear in the Spotify app's device list.</span>
                    </div>

                    <div class="form-group">
                        <label for="Bitrate">Audio Quality (Bitrate)</label>
                        <select id="Bitrate" name="Bitrate">
                            <option value="96">Normal (96 kbps)</option>
                            <option value="160">High (160 kbps)</option>
                            <option value="320">Very High (320 kbps)</option>
                        </select>
                        <span class="help-text">Higher bitrates require more network bandwidth.</span>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="saveBtn">
                            <span class="btn-text">Save Changes</span>
                            <span class="loader hidden"></span>
                        </button>
                        <a href="/local/spotifyconnect/librespot.log" target="_blank" style="color: var(--text-subdued); text-decoration: none; font-size: 0.875rem; margin-left: auto;">View Debug Log</a>
                        <span id="saveMessage" class="save-message"></span>
                    </div>
                </form>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
